# Cookmate · production-style docker-compose
#
# Usage:
#   1. Copy .env.example to .env and set POSTGRES_PASSWORD + GHCR_OWNER.
#   2. docker compose pull
#   3. docker compose up -d
#
# The cookmate-web container exposes port 8080 on the host. /api/* requests
# are proxied internally by nginx to the cookmate-api container.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cookmate
      POSTGRES_USER: cookmate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.example)}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cookmate -d cookmate']
      interval: 5s
      timeout: 3s
      retries: 12

  cookmate-api:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER is required (see .env.example)}/cookmate-api:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Double underscore maps to ":" in ASP.NET Core configuration.
      ConnectionStrings__CookmateDb: "Host=postgres;Port=5432;Database=cookmate;Username=cookmate;Password=${POSTGRES_PASSWORD}"
      FileStorage__RootPath: /app/App_Data/media
    volumes:
      - media:/app/App_Data/media
    # Internal-only by default; expose to host for debugging if you need to hit Scalar directly.
    # ports:
    #   - "5285:8080"

  cookmate-web:
    image: ghcr.io/${GHCR_OWNER}/cookmate-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - cookmate-api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres-data:
  media:
