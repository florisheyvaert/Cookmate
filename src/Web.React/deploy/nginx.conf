server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed asset bundles.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Proxy API + auth to the cookmate-api service. Using $service_pass lets the
    # API host/port be overridden at runtime if the docker-compose service name
    # ever changes. Fixed default keeps the image self-contained.
    location /api/ {
        proxy_pass http://cookmate-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large uploads (matches the API's 50 MB media cap).
        client_max_body_size 60m;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every non-API path returns index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't expose the nginx server token.
    server_tokens off;
}
